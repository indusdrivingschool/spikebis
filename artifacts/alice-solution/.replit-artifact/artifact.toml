kind = "web"
previewPath = "/"
title = "Alice Solution Co"
version = "1.0.0"
id = "artifacts/alice-solution"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22184

[services.development]
run = "pnpm --filter @workspace/alice-solution run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/alice-solution", "run", "build" ]
publicDir = "artifacts/alice-solution/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22184"
BASE_PATH = "/"
